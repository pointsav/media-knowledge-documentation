facts:
  - text: "The platform remains fully operational with zero AI inference active — the deterministic data layer, extraction pipeline, and file ledger carry full production load before a single inference call is made."
    link_slug: substrate/substrate-without-inference-base-case

  - text: "Every write to the audit ledger is cryptographically sealed and append-only by design, satisfying SEC Rule 17a-4(f) and BCSC continuous-disclosure requirements without a compliance overlay."
    link_slug: infrastructure/worm-ledger-design

  - text: "The platform selected OLMo 3 over competing open models because its training data, training code, and intermediate checkpoints are all published — the depth of openness that allows customers to own derivative models for a five-year horizon."
    link_slug: substrate/llm-substrate-decision

  - text: "The commercial threshold is an architectural boundary, not a feature tier — single-archive operation is sovereignty infrastructure published under open licences, and the revenue model activates only when two or more archives must coordinate."
    link_slug: substrate/knowledge-commons

  - text: "Every deployment artefact and every audit-ledger entry lives in the customer's filesystem — the vendor has zero data custody and zero access to customer data at any point in the operational lifecycle."
    link_slug: architecture/customer-hostability

  - text: "Every inference call passes through a single logged boundary, making the platform the only AI-adjacent system where every call can be replayed from the cryptographic audit ledger."
    link_slug: architecture/doorman-protocol

  - text: "The platform's addressable market is the $5,000–$50,000 ACV band that hyperscaler economics structurally cannot serve — not a positioning claim, but an outcome of per-seat infrastructure costs at enterprise cloud scale."
    link_slug: architecture/economic-model
