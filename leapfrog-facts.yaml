# leapfrog-facts.yaml — Did You Know panel for documentation.pointsav.com home page
#
# Rendered as the right-column panel on the home page (label rendered by
# the engine; this YAML supplies the body bullets). Engine reads on each
# request; absent → suppress panel; present → render bulleted list with
# optional wikilink anchors.
#
# Schema:
#   facts:
#     - text: <one sentence drawn from a TOPIC, banker register, no marketing copy>
#       link_slug: <slug of the source TOPIC for [more] link>
#
# Reader: dual audience — engineering reader and financial-community reader.
# Each fact should be surprising to someone who knows the AI-vendor landscape
# but not PointSav specifically: structural defensibility (not feature lists),
# governance discipline (not testimonials), clear answer to "why is this not
# just another AI vendor?"
#
# Refreshed 2026-05-09 by project-editorial Task —
# replaced prior "leapfrog inventions" framing with banker-grade Structural
# Facts; vocabulary scrubbed of workspace-internal governance terms.

facts:
  - text: "The platform runs entirely on commodity hardware — the base inference model runs on a standard 4-vCPU node with no GPU, and only specialised workloads burst to GPU on demand."
    link_slug: doorman-protocol

  - text: "The platform remains fully operational with zero AI inference active — the deterministic file ledger, knowledge graph, and extraction pipeline are load-bearing; AI is an optional layer."
    link_slug: substrate-without-inference-base-case

  - text: "Customer data never leaves the customer's infrastructure: every adapter and every audit-ledger entry stays in the customer's filesystem; the vendor has zero data custody."
    link_slug: customer-hostability

  - text: "OLMo 3 is the only open language model where training data, training code, and intermediate checkpoints are all published — the depth of openness that enables five-year customer ownership of derivative models."
    link_slug: llm-substrate-decision

  - text: "Disclosure compliance is built into the commit layer, not bolted on: the engineering wiki itself — version control with signed authorship and cryptographic hashes — is the continuous-disclosure record, satisfying BCSC and SEC Rule 17a-4(f) by structure."
    link_slug: disclosure-substrate

  - text: "Every inference call is logged to an immutable audit ledger and routed through a single boundary, enforcing a sanitise-before-leaving discipline on every AI request that exits the customer vault."
    link_slug: doorman-protocol

  - text: "The commercial threshold is not a feature tier but an architectural boundary — the revenue model crosses only when two or more archives must coordinate; single-archive operation is sovereignty infrastructure, published under open licenses."
    link_slug: knowledge-commons
